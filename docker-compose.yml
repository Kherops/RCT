version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rtc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtc_user
      POSTGRES_PASSWORD: rtc_password
      POSTGRES_DB: rtc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtc_user -d rtc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: rtc-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtc_user
      POSTGRES_PASSWORD: rtc_password
      POSTGRES_DB: rtc_db_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtc_user -d rtc_db_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
